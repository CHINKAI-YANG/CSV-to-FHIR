<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FHIR 排班轉換器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .upload-section { margin: 25px 0; padding: 30px; border: 2px dashed #3498db; background-color: #f9fbff; border-radius: 8px; text-align: center; transition: 0.3s; }
        .upload-section:hover { border-color: #2980b9; background-color: #f1f7ff; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        button { border: none; padding: 12px 24px; cursor: pointer; border-radius: 6px; font-size: 15px; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: white; display: none; }
        .btn-success:hover { background: #219150; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow-x: auto; max-height: 450px; font-size: 13px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .error { color: #e74c3c; background: #fdf2f2; padding: 15px; border-left: 5px solid #e74c3c; border-radius: 4px; white-space: pre-wrap; }
        #statusText { margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏥 FHIR Slot 轉檔工具 (v1.0)</h2>
        <p>請選擇包含標題的 CSV 檔案，系統將自動驗證<strong>時間衝突</strong>並轉換為 FHIR R4 Bundle 格式。</p>
        
        <div class="upload-section">
            <input type="file" id="csvFile" accept=".csv">
            <div class="btn-group">
                <button class="btn-primary" onclick="uploadFile()">🚀 開始轉換並驗證</button>
                <button id="downloadBtn" class="btn-success">💾 下載 JSON 檔案</button>
            </div>
        </div>

        <div id="resultSection" style="display:none;">
            <div id="statusText"></div>
            <pre id="jsonResult"></pre>
        </div>
    </div>

    <script>
        let currentJsonBlob = null;

        async function uploadFile() {
            const fileInput = document.getElementById('csvFile');
            const resultSection = document.getElementById('resultSection');
            const jsonResult = document.getElementById('jsonResult');
            const statusText = document.getElementById('statusText');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!fileInput.files[0]) {
                alert("請先選擇檔案！");
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // 重置介面
            statusText.innerText = "⏳ 正在處理中，請稍候...";
            statusText.style.color = "#34495e";
            jsonResult.innerText = "";
            resultSection.style.display = 'block';
            downloadBtn.style.display = 'none';

            try {
                const response = await fetch('/api/ScheduleUpload/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.text();

                if (response.ok) {
                    const jsonObj = JSON.parse(data);
                    jsonResult.innerText = JSON.stringify(jsonObj, null, 4);
                    jsonResult.className = "";
                    statusText.innerText = "✅ 轉換成功！所有時段驗證通過。";
                    statusText.style.color = "#27ae60";

                    // 準備下載功能
                    const blob = new Blob([JSON.stringify(jsonObj, null, 4)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    downloadBtn.style.display = 'inline-block';
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `FHIR_Slots_${new Date().getTime()}.json`;
                        a.click();
                    };
                } else {
                    jsonResult.innerHTML = `<div class="error">${data}</div>`;
                    statusText.innerText = "❌ 轉換失敗：發現數據異常";
                    statusText.style.color = "#e74c3c";
                }
            } catch (error) {
                jsonResult.innerHTML = `<div class="error">無法連線至後端 API，請確認 dotnet 是否正在執行。</div>`;
                statusText.innerText = "❌ 連線錯誤";
            }
        }
    </script>
</body>
</html>
